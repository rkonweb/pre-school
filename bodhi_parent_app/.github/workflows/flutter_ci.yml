name: Flutter CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  FLUTTER_VERSION: '3.19.0'

jobs:
  # ─── Job 1: Test ────────────────────────────────────────────────────────────
  test:
    name: Analyze & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos

      - name: Run tests
        run: flutter test --coverage

      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          file: coverage/lcov.info
        continue-on-error: true

  # ─── Job 2: Build Android ───────────────────────────────────────────────────
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK (debug for PRs, release for main)
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            flutter build apk --release --split-per-abi \
              --dart-define=API_BASE_URL=${{ secrets.PROD_API_URL }} \
              --dart-define=IS_PRODUCTION=true
          else
            flutter build apk --debug \
              --dart-define=API_BASE_URL=${{ secrets.STAGING_API_URL }}
          fi

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: build/app/outputs/flutter-apk/*.apk
          retention-days: 7

  # ─── Job 3: Build iOS (macOS runner needed) ─────────────────────────────────
  build-ios:
    name: Build iOS IPA
    runs-on: macos-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Build iOS (no codesign for CI)
        run: |
          flutter build ios --release --no-codesign \
            --dart-define=API_BASE_URL=${{ secrets.PROD_API_URL }} \
            --dart-define=IS_PRODUCTION=true

      - name: Upload iOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-ios-build
          path: build/ios/iphoneos/Runner.app
          retention-days: 7

  # ─── Job 4: Firebase App Distribution (main branch only) ───────────────────
  distribute:
    name: Distribute to Testers
    runs-on: ubuntu-latest
    needs: build-android
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: app-release-apk
          path: apk/

      - name: Upload to Firebase App Distribution
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_APP_ID }}
          token: ${{ secrets.FIREBASE_TOKEN }}
          groups: beta-parents
          file: apk/app-arm64-v8a-release.apk
          releaseNotes: |
            Build from ${{ github.sha }}
            Branch: ${{ github.ref_name }}
            Triggered by: ${{ github.actor }}
